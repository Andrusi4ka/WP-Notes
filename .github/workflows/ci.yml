name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PHP lint and smoke checks
        run: composer test

      - name: JavaScript syntax checks
        run: npm test
